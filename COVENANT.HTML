<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>📜 THE COVENANT // PROJECT KORE</title>
    <script>if (performance.navigation.type === 1) { window.location.href = "guild.html"; }</script>
    <style>
        :root { --noir: #050505; --gold: #d4af37; --glass: rgba(15, 15, 15, 0.95); }
        body { background: var(--noir); color: #e0e0e0; font-family: 'Georgia', serif; margin: 0; overflow-x: hidden; }
        .pulse { position: fixed; top: 0; width: 100%; height: 100%; background: var(--gold); opacity: 0; pointer-events: none; animation: p 0.166s infinite alternate; z-index: 999; }
        @keyframes p { from { opacity: 0; } to { opacity: 0.02; } }
        #interface { min-height: 100vh; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); padding: 20px; }
        .command-vault { border: 1px solid var(--gold); padding: 40px; background: var(--glass); width: 100%; max-width: 700px; box-shadow: 0 0 50px #000; }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 10px; }
        .directive-list { list-style: none; padding: 0; }
        .directive-item { border-left: 2px solid var(--gold); padding: 15px; margin: 15px 0; background: rgba(255,255,255,0.03); font-size: 0.9rem; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 10px 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .back-link:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <div class="pulse"></div>
    <main id="interface">
        <section class="command-vault">
            <h1>📜 THE COVENANT</h1>
            <p style="font-size: 0.7rem; opacity: 0.5;">[ GUILD COMMAND SECTOR // ENEE COMPLIANT ]</p>
            <div class="directive-list">
                <div class="directive-item"><strong>DIRECTIVE 01:</strong> Homeschooling modules to local 0330 Audit.</div>
                <div class="directive-item"><strong>DIRECTIVE 02:</strong> Akasia Moon creative queue hardened against industrial extraction.</div>
                <div class="directive-item"><strong>DIRECTIVE 03:</strong> Maintain 5.0W power threshold for all legacy hardware (S9/LTE).</div>
            </div>
            <a href="guild.html" class="back-link">Return to Guild Hall</a>
        </section>
    </main>
</body>
</html>
