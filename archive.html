<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT KORE // THE ARCHIVE // TEST SHELL 1 //</title>
    <style>
        :root {
            /* UNIVERSAL PALETTE MANIFEST (GROUND TRUTH: NOIR) */
            --primary: #D4AF37; 
            --primary-glow: rgba(212, 175, 55, 0.35);
            --hijack-glow: rgba(229, 149, 0, 0.6);
            --glass: rgba(6, 6, 8, 0.98);
            --unison-tempo: 8s;
            --unison-ease: cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* --- THE SOVEREIGN JOLT ARRAY --- */
        .noir-mode { --primary: #D4AF37; --hijack-glow: rgba(229, 149, 0, 0.6); --glass: rgba(6, 6, 8, 0.98); }
        .lunar-mode { --primary: #A5F2F3; --hijack-glow: rgba(0, 80, 150, 0.5); --glass: rgba(4, 8, 12, 0.98); }
        .vellum-mode { --primary: #C2B280; --hijack-glow: rgba(101, 67, 33, 0.5); --glass: rgba(12, 10, 8, 0.98); }
        .amethyst-mode { --primary: #9966CC; --hijack-glow: rgba(75, 0, 130, 0.5); --glass: rgba(10, 6, 12, 0.98); }

        body, html {
            margin: 0; padding: 0; background: #000;
            overflow: hidden; font-family: 'Times New Roman', serif;
            height: 100%; width: 100%; color: #F4EBD0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- LAYER 1: THE HEARTH (8K GALLERY BREATH) --- */
        #bg-anchor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020204 url('gallery_8k.webp') no-repeat center center;
            background-size: cover; z-index: 1;
            animation: flatlineBreath var(--unison-tempo) infinite alternate var(--unison-ease);
            will-change: transform; transform: translateZ(0);
        }
        @keyframes flatlineBreath { 0% { transform: scale(1) translateZ(0); } 100% { transform: scale(1.08) translateZ(0); } }

        /* --- LAYER 2: SOMATIC HIJACK (INTENSIFIED VIGNETTE) --- */
        #glow-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 10%, var(--hijack-glow) 80%, var(--hijack-glow) 100%);
            z-index: 5; pointer-events: none;
            animation: flatlineGlow var(--unison-tempo) infinite alternate var(--unison-ease);
            will-change: opacity; opacity: 0.15;
            transition: background 1.5s var(--unison-ease);
        }
        @keyframes flatlineGlow { 0% { opacity: 0.15; } 100% { opacity: 0.75; } }

        /* --- UI VIEWPORT --- */
        #ui-viewport {
            position: relative; z-index: 100;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
            transition: opacity 1.5s var(--unison-ease);
        }
        .cloaked { opacity: 0 !important; pointer-events: none !important; }

        /* --- THE ARCHIVE VAULT (Massive Mass) --- */
        .archive-vault {
            width: 95%; max-width: 950px; height: 80vh;
            background: var(--glass);
            border: 2px solid var(--primary);
            padding: 45px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 30px;
            box-shadow: 0 0 100px #000, inset 0 0 40px var(--primary-glow);
            transition: all 1s var(--unison-ease);
        }

        .vault-header { border-bottom: 2px solid var(--primary); padding-bottom: 20px; }
        .vault-header h2 { 
            margin: 0; font-size: 1.5rem; letter-spacing: 16px; 
            text-transform: uppercase; font-weight: normal; color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .annals-body {
            flex: 1; overflow-y: auto;
            font-family: 'Georgia', serif; line-height: 2.2;
            padding-right: 25px; font-size: 1.1rem;
            color: rgba(244, 235, 208, 0.85);
            scrollbar-width: none;
        }
        .annals-body::-webkit-scrollbar { display: none; }

        .lore-input {
            background: rgba(0,0,0,0.3); border: none;
            border-left: 2px solid var(--primary);
            color: var(--primary); padding: 20px;
            outline: none; resize: none; font-family: monospace;
            font-size: 0.95rem; transition: border 0.5s;
        }

        /* --- COMMAND ARRAY --- */
        .command-array {
            margin-top: 40px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        }
        .lux-btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--primary);
            color: var(--primary); padding: 12px 28px; cursor: pointer;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 5px;
            transition: 0.4s;
        }
        .lux-btn:hover { background: var(--primary-glow); }

        #cloak-btn {
            position: fixed; top: 35px; right: 35px; z-index: 2000;
            background: none; border: 1px solid var(--primary);
            color: var(--primary); padding: 10px 22px; cursor: pointer; 
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px;
            backdrop-filter: blur(5px); transition: all 1s;
        }
    </style>
</head>
<body id="master-body" onclick="ghostRestore()">

    <button id="cloak-btn" onclick="toggleCloak(event)">CLOAK LEDGER</button>

    <div id="bg-anchor"></div>
    <div id="glow-layer"></div>

    <div id="ui-viewport">
        <div class="archive-vault">
            <div class="vault-header">
                <h2>The Archive</h2>
                <span style="font-size: 0.55rem; opacity: 0.4; letter-spacing: 6px;">SOVEREIGN SOMATIC MEMORY</span>
            </div>
            
            <div class="annals-body" id="annals">
                <p><em>> Awaiting the Architect's Lore...</em></p>
            </div>

            <textarea class="lore-input" id="lore-editor" rows="3" placeholder="RECORD THE LORE..."></textarea>
        </div>

        <div class="command-array">
            <button class="lux-btn" onclick="jolt('noir')">Noir</button>
            <button class="lux-btn" onclick="jolt('lunar')">Lunar</button>
            <button class="lux-btn" onclick="jolt('vellum')">Vellum</button>
            <button class="lux-btn" onclick="jolt('amethyst')">Amethyst</button>
            <button class="lux-btn" onclick="commitLore()" style="border-color: #fff; color: #fff;">Commit Lore</button>
        </div>
    </div>

    <audio id="wind-atmosphere" src="winterwind.mp3" loop></audio>

    <script>
        let atmosphereArmed = false;
        const wind = document.getElementById('wind-atmosphere');

        // --- THE SOVEREIGN HANDSHAKE (Universal Trigger) ---
        function armAtmosphere() {
            if (!atmosphereArmed) {
                wind.volume = 0.3;
                wind.play()
                    .then(() => {
                        atmosphereArmed = true;
                        console.log("📂 Atmosphere Online: Handshake Success.");
                    })
                    .catch(e => console.log("Handshake Pending User Strike..."));
            }
        }

        // Catch the FIRST touch anywhere on the rig
        document.body.addEventListener('click', armAtmosphere, { once: true });

        function jolt(palette) {
            armAtmosphere(); // Redundant check
            const body = document.getElementById('master-body');
            body.classList.remove('noir-mode', 'lunar-mode', 'vellum-mode', 'amethyst-mode');
            if (palette !== 'default') body.classList.add(`${palette}-mode`);
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function commitLore() {
            armAtmosphere(); // Redundant check
            const input = document.getElementById('lore-editor');
            const annals = document.getElementById('annals');
            if (input.value.trim() !== "") {
                const p = document.createElement('p');
                p.textContent = `> ${input.value}`;
                annals.appendChild(p);
                input.value = "";
                annals.scrollTop = annals.scrollHeight;
                if (navigator.vibrate) navigator.vibrate([30, 50]);
            }
        }

        function toggleCloak(e) {
            e.stopPropagation();
            armAtmosphere();
            const viewport = document.getElementById('ui-viewport');
            const isCloaked = viewport.classList.toggle('cloaked');
            document.getElementById('cloak-btn').innerText = isCloaked ? "RESTORE LEDGER" : "CLOAK LEDGER";
        }

        function ghostRestore() {
            const viewport = document.getElementById('ui-viewport');
            if (viewport.classList.contains('cloaked')) {
                viewport.classList.remove('cloaked');
                document.getElementById('cloak-btn').innerText = "CLOAK LEDGER";
            }
        }
    </script>
</body>
</html>
