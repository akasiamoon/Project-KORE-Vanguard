<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORE // THE ARCHIVE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;0,600;1,300&display=swap');

        [x-cloak] { display: none !important; }

        :root {
            --obsidian: #020406;
            --gold-leaf: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --amethyst-resonance: rgba(99, 64, 135, 0.4);
            --glass: rgba(5, 8, 15, 0.75);
            --border: 1px solid rgba(197, 160, 89, 0.25);
        }

        body {
            margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Spectral', serif;
            background-color: var(--obsidian);
            /* THE NUCLEAR BRIDGE: 8K ASSET WITH VIGNETTE */
            background: 
                radial-gradient(circle at center, rgba(2,4,6,0.1) 0%, rgba(2,4,6,0.95) 100%),
                url('gallery_8k.webp') center/cover no-repeat;
            color: #e0d8c3;
            display: flex; flex-direction: column;
        }

        /* SOVEREIGN-BLIND VEIL (ESC) */
        .veiled { filter: blur(70px) brightness(0.05) grayscale(1); pointer-events: none; }

        /* SOMATIC LAYER (THE BREATH) */
        @keyframes pulse6Hz {
            0% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.02); }
            100% { opacity: 0; transform: scale(1); }
        }
        .somatic-pulse {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--amethyst-resonance) 0%, transparent 70%);
            pointer-events: none; z-index: 1;
            mix-blend-mode: overlay; /* INTERACTS WITH IMAGE COLORS */
            animation: pulse6Hz 0.166s infinite ease-in-out;
            display: none;
        }
        .pulse-active { display: block; }

        /* THE HEADER */
        .nav-header {
            padding: 40px 60px; display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .kore-title {
            font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 10px;
            color: var(--gold-leaf); text-shadow: 0 0 25px var(--gold-glow);
            text-transform: uppercase;
        }

        /* THE WORKSPACE */
        .workspace { display: flex; flex: 1; padding: 0 60px 60px; gap: 40px; overflow: hidden; z-index: 10; }

        .desk-card {
            background: var(--glass); backdrop-filter: blur(50px);
            border: var(--border); position: relative;
            flex: 2; display: flex; flex-direction: column; padding: 60px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9), inset 0 0 60px rgba(197, 160, 89, 0.03);
            border-radius: 2px;
        }

        /* GOLD FILIGREE ACCENTS */
        .filigree {
            position: absolute; width: 50px; height: 50px;
            border: 1px solid var(--gold-leaf); opacity: 0.6;
        }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        .entry-title {
            background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.15);
            color: #fff; font-family: 'Cinzel', serif; font-size: 2.2rem; outline: none;
            margin-bottom: 30px; width: 100%; letter-spacing: 3px;
        }

        .entry-body {
            background: transparent; border: none; color: #d1c7b0;
            font-size: 1.25rem; line-height: 1.9; outline: none; resize: none;
            flex: 1; font-style: italic; font-weight: 300;
        }

        /* SIDEBAR (THE VAULT) */
        .sidebar {
            background: var(--glass); backdrop-filter: blur(50px); border: var(--border);
            width: 350px; display: flex; flex-direction: column; padding: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .section-label {
            font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px;
            color: var(--gold-leaf); margin-bottom: 25px; opacity: 0.5;
        }

        /* BUTTONS */
        .btn {
            background: transparent; border: 1px solid var(--gold-leaf);
            color: var(--gold-leaf); padding: 14px 28px; cursor: pointer;
            font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 4px;
            transition: 0.5s; margin-top: 25px; text-transform: uppercase;
        }
        .btn:hover { background: var(--gold-leaf); color: var(--obsidian); box-shadow: 0 0 40px var(--gold-glow); }

        .nerve-btn {
            background: rgba(197, 160, 89, 0.03); border: 1px solid rgba(197, 160, 89, 0.15);
            color: var(--gold-leaf); padding: 8px 18px; font-size: 0.55rem; cursor: pointer;
            letter-spacing: 3px; font-family: 'Cinzel', serif; margin-left: 10px;
            text-transform: uppercase; transition: 0.3s;
        }
        .nerve-btn.active { background: var(--gold-leaf); color: #000; border-color: var(--gold-leaf); }
    </style>
</head>
<body x-data="archiveApp()" :class="{'veiled': isVeiled}" @keydown.escape.window="isVeiled = !isVeiled">

    <div class="somatic-pulse" :class="{'pulse-active': nerve === 'Static'}"></div>

    <nav class="nav-header">
        <div class="kore-title">Project Kore // Archive</div>
        <div>
            <button class="nerve-btn" @click="nerve = 'Grounded'" :class="nerve === 'Grounded' ? 'active' : ''">Grounded</button>
            <button class="nerve-btn" @click="nerve = 'Static'" :class="nerve === 'Static' ? 'active' : ''">Static</button>
            <button class="nerve-btn" @click="isVeiled = !isVeiled" style="border-color: #634087; color: #d8b4e2;">Cloak (Esc)</button>
        </div>
    </nav>

    <main class="workspace">
        <section class="desk-card">
            <div class="filigree top-left"></div>
            <div class="filigree bottom-right"></div>
            
            <input type="text" class="entry-title" x-model="current.title" placeholder="A History of the Forge...">
            <textarea class="entry-body" x-model="current.content" placeholder="Document the lore, Architect..."></textarea>
