<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORE // THE ARCHIVE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;0,600;1,300&display=swap');

        [x-cloak] { display: none !important; }

        :root {
            --obsidian: #05070a;
            --gold-leaf: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.3);
            --amethyst: #634087;
            --glass: rgba(10, 15, 25, 0.7);
            --border: 1px solid rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Spectral', serif;
            background-color: var(--obsidian);
            /* FALLBACK GRADIENT + THE 8K ASSET */
            background: 
                radial-gradient(circle at center, rgba(5,7,10,0) 0%, rgba(5,7,10,0.9) 100%),
                url('gallery_8k.webp') center/cover no-repeat;
            color: #e0d8c3;
            display: flex; flex-direction: column;
        }

        /* SOVEREIGN-BLIND VEIL (ESC) */
        .veiled { filter: blur(60px) brightness(0.1) grayscale(1); pointer-events: none; }

        /* THE HEADER (LUXURY MINIMALISM) */
        .nav-header {
            padding: 40px 60px; display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .kore-title {
            font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 8px;
            color: var(--gold-leaf); text-shadow: 0 0 20px var(--gold-glow);
            text-transform: uppercase;
        }

        /* THE DESK (WORKSPACE) */
        .workspace { display: flex; flex: 1; padding: 0 60px 60px; gap: 40px; overflow: hidden; }

        .desk-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border: var(--border); position: relative;
            flex: 2; display: flex; flex-direction: column; padding: 60px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 50px rgba(197, 160, 89, 0.05);
        }

        /* FILIGREE CORNERS */
        .desk-card::before, .desk-card::after {
            content: ''; position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--gold-leaf);
        }
        .desk-card::before { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .desk-card::after { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        .entry-title {
            background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.1);
            color: #fff; font-family: 'Cinzel', serif; font-size: 2.4rem; outline: none;
            margin-bottom: 30px; width: 100%; letter-spacing: 2px;
        }

        .entry-body {
            background: transparent; border: none; color: #d1c7b0;
            font-size: 1.3rem; line-height: 1.8; outline: none; resize: none;
            flex: 1; font-style: italic; font-weight: 300;
        }

        /* SIDEBAR (THE VAULT) */
        .sidebar {
            background: var(--glass); backdrop-filter: blur(40px); border: var(--border);
            width: 350px; display: flex; flex-direction: column; padding: 30px;
        }

        .section-label {
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 4px;
            color: var(--gold-leaf); margin-bottom: 20px; opacity: 0.6;
        }

        /* BUTTONS */
        .btn {
            background: transparent; border: 1px solid var(--gold-leaf);
            color: var(--gold-leaf); padding: 12px 24px; cursor: pointer;
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 3px;
            transition: 0.4s; margin-top: 20px;
        }
        .btn:hover { background: var(--gold-leaf); color: var(--obsidian); box-shadow: 0 0 30px var(--gold-glow); }

        .nerve-btn {
            background: rgba(197, 160, 89, 0.05); border: 1px solid rgba(197, 160, 89, 0.2);
            color: var(--gold-leaf); padding: 8px 15px; font-size: 0.6rem; cursor: pointer;
            letter-spacing: 2px; font-family: 'Cinzel', serif; margin-left: 10px;
        }
        .nerve-btn.active { background: var(--gold-leaf); color: #000; }

        /* 6Hz PULSE */
        @keyframes pulse6Hz {
            0% { opacity: 0; } 50% { opacity: 0.15; } 100% { opacity: 0; }
        }
        .pulse {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--amethyst); pointer-events: none; z-index: 5;
            animation: pulse6Hz 0.166s infinite; display: none;
        }
        .pulse-on { display: block; }
    </style>
</head>
<body x-data="archiveApp()" :class="{'veiled': isVeiled}" @keydown.escape.window="isVeiled = !isVeiled">

    <div class="pulse" :class="{'pulse-on': nerve === 'Static'}"></div>

    <nav class="nav-header">
        <div class="kore-title">Project Kore // Archive</div>
        <div>
            <button class="nerve-btn" @click="nerve = 'Grounded'" :class="nerve === 'Grounded' ? 'active' : ''">Grounded</button>
            <button class="nerve-btn" @click="nerve = 'Static'" :class="nerve === 'Static' ? 'active' : ''">Static</button>
            <button class="nerve-btn" @click="isVeiled = !isVeiled">Cloak</button>
        </div>
    </nav>

    <main class="workspace">
        <section class="desk-card">
            <input type="text" class="entry-title" x-model="current.title" placeholder="Untitled Scroll...">
            <textarea class="entry-body" x-model="current.content" placeholder="Transmute the siege into lore..."></textarea>
            <button class="btn" @click="save()">Commit to History</button>
        </section>

        <aside class="sidebar">
            <div class="section-label">Vaulted Lore</div>
            <div style="overflow-y: auto; flex: 1;">
                <template x-for="entry in entries" :key="entry.id">
                    <div style="padding: 15px 0; border-bottom: 1px solid rgba(197,160,89,0.1); cursor: pointer;" @click="current = {...entry}">
                        <div style="font-size: 0.6rem; color: var(--gold-leaf); opacity: 0.5;" x-text="entry.date"></div>
                        <div style="font-size: 1.1rem; margin-top: 5px; font-style: italic;" x-text="entry.title || 'Unknown Scroll'"></div>
                    </div>
                </template>
            </div>
        </aside>
    </main>

    <script>
        function archiveApp() {
            return {
                isVeiled: false,
                nerve: 'Grounded',
                entries: JSON.parse(localStorage.getItem('KORE_LORE')) || [],
                current: { id: null, title: '', content: '' },
                save() {
                    if(!this.current.title && !this.current.content) return;
                    const date = new Date().toLocaleDateString();
                    if(this.current.id) {
                        const i = this.entries.findIndex(e => e.id === this.current.id);
                        this.entries[i] = { ...this.current, date };
                    } else {
                        this.entries.push({ ...this.current, id: Date.now(), date });
                    }
                    localStorage.setItem('KORE_LORE', JSON.stringify(this.entries));
                    alert("Lore Anchored.");
                }
            }
        }
    </script>
</body>
</html>
