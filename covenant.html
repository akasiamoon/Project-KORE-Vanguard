<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE COVENANT // PROJECT KORE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        if (performance.navigation.type === 1 || window.performance.getEntriesByType("navigation")[0].type === "reload") {
            window.location.href = "guild.html"; 
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg: #050505; --accent: #d4af37; --text: #e0e0e0; --glass: rgba(15, 15, 15, 0.9); }
        [data-palette="LUNAR"] { --bg: #0a0c10; --accent: #a8c0ff; --text: #ffffff; }
        [data-palette="VELLUM"] { --bg: #0f0d0b; --accent: #c4a484; --text: #d2b48c; }
        [data-palette="AMETHYST"] { --bg: #0d0510; --accent: #cd7f32; --text: #9b59b6; }

        body { margin: 0; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; background-color: var(--bg); color: var(--text); transition: 0.8s; }
        
        /* SOMATIC ANCHORS */
        .neural-anchor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); opacity: 0; pointer-events: none; z-index: 9999; animation: brainReset 0.166s infinite alternate; }
        @keyframes brainReset { from { opacity: 0; } to { opacity: 0.02; } }
        .breathing-filigree { position: fixed; bottom: -10%; right: -10%; width: 70%; height: 70%; background: radial-gradient(circle at bottom right, var(--accent), transparent 70%); filter: blur(60px); pointer-events: none; z-index: 1; animation: somaticBreath 19s infinite ease-in-out; }
        @keyframes somaticBreath { 0%, 100% { opacity: 0.05; transform: scale(1); } 21%, 58% { opacity: 0.3; transform: scale(1.1); } }

        .nav-header { position: absolute; top: 0; width: 100%; padding: 30px 40px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; }
        .artifact-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }

        #interface { height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 10; position: relative; }
        .command-vault { border: 1px solid var(--accent); padding: 50px; background: var(--glass); width: 100%; max-width: 700px; backdrop-filter: blur(20px); }
        .directive-card { border-left: 2px solid var(--accent); padding: 15px; margin: 20px 0; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body x-data="covenantApp()">
    <div class="neural-anchor"></div>
    <div class="breathing-filigree"></div>
    <nav class="nav-header">
        <a href="guild.html" class="back-link">◂ GUILD HALL</a>
        <button class="artifact-btn" onclick="toggleAlignment()">✨ ALIGNMENT</button>
    </nav>
    <main id="interface">
        <section class="command-vault">
            <h1 style="color: var(--accent); letter-spacing: 8px; text-transform: uppercase;">📜 THE COVENANT</h1>
            <div class="directive-card"><strong>DIRECTIVE ALPHA:</strong> Maintain ENEE-5W Infrastructure.</div>
            <div class="directive-card"><strong>DIRECTIVE BETA:</strong> Codify shared family milestones.</div>
            <div class="directive-card"><strong>DIRECTIVE GAMMA:</strong> Secure Prior-Art via Forensic Ledger.</div>
        </section>
    </main>
    <script>
        const palettes = ['NOIR', 'LUNAR', 'VELLUM', 'AMETHYST'];
        function toggleAlignment() {
            let next = palettes[(palettes.indexOf(localStorage.getItem('KORE_Palette') || 'NOIR') + 1) % palettes.length];
            document.documentElement.setAttribute('data-palette', next);
            localStorage.setItem('KORE_Palette', next);
        }
        document.addEventListener('DOMContentLoaded', () => { document.documentElement.setAttribute('data-palette', localStorage.getItem('KORE_Palette') || 'NOIR'); });
        document.addEventListener('alpine:init', () => { Alpine.data('covenantApp', () => ({ init() {} })) });
    </script>
</body>
</html>
