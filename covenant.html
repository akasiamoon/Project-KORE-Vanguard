<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT KORE // COVENANT COMMAND // TEST SHELL 2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #D4AF37; 
            --primary-glow: rgba(212, 175, 55, 0.4);
            --hijack-glow: rgba(229, 149, 0, 0.6);
            --glass: rgba(6, 6, 8, 0.98);
            --unison-tempo: 8s;
            --unison-ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        .noir-mode { --primary: #D4AF37; --hijack-glow: rgba(229, 149, 0, 0.6); }
        .lunar-mode { --primary: #A5F2F3; --hijack-glow: rgba(0, 80, 150, 0.5); }
        .vellum-mode { --primary: #C2B280; --hijack-glow: rgba(101, 67, 33, 0.5); }
        .amethyst-mode { --primary: #9966CC; --hijack-glow: rgba(75, 0, 130, 0.5); }

        body, html {
            margin: 0; padding: 0; background: #000;
            overflow: hidden; font-family: 'Times New Roman', serif;
            height: 100%; width: 100%; color: #F4EBD0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- THE HEARTH --- */
        #bg-anchor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020204 url('logistics_8k.webp') no-repeat center center;
            background-size: cover; z-index: 1;
            animation: flatlineBreath var(--unison-tempo) infinite alternate var(--unison-ease);
            will-change: transform; transform: translateZ(0);
        }
        @keyframes flatlineBreath { 0% { transform: scale(1.1); } 100% { transform: scale(1.16); } }

        #glow-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 15%, var(--hijack-glow) 100%);
            z-index: 5; pointer-events: none;
            animation: flatlineGlow var(--unison-tempo) infinite alternate var(--unison-ease);
            will-change: opacity; opacity: 0.15;
        }
        @keyframes flatlineGlow { 0% { opacity: 0.15; } 100% { opacity: 0.75; } }

        /* --- THE SOMATIC GATE --- */
        #handshake-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(40px); transition: opacity 1.2s var(--unison-ease), visibility 1.2s;
        }
        #handshake-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .handshake-input-wrap {
            position: relative; border-bottom: 2px solid var(--primary);
            padding: 10px; width: 280px; text-align: center;
        }
        .handshake-input-wrap input {
            background: transparent; border: none; color: var(--primary);
            text-align: center; font-size: 2rem; letter-spacing: 15px;
            outline: none; width: 100%; font-family: monospace;
            -webkit-text-security: disc;
        }
        .gate-label {
            font-size: 0.55rem; letter-spacing: 6px; color: var(--primary);
            opacity: 0.4; margin-bottom: 20px; text-transform: uppercase;
        }

        /* --- COMMAND VIEWPORT --- */
        #ui-viewport {
            position: relative; z-index: 100;
            height: 100vh; width: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
            transition: opacity 1.5s var(--unison-ease), transform 1.5s var(--unison-ease);
            opacity: 0; transform: scale(0.98);
        }
        #ui-viewport.active { opacity: 1; transform: scale(1); }
        #ui-viewport.cloaked { opacity: 0 !important; pointer-events: none !important; }

        .command-tank {
            width: 98%; max-width: 1300px; height: 92vh;
            background: var(--glass); border: 2px solid var(--primary);
            padding: 25px; box-sizing: border-box;
            display: grid; grid-template-rows: auto 1fr auto; gap: 20px;
            box-shadow: 0 0 100px #000, inset 0 0 40px var(--primary-glow);
            backdrop-filter: blur(15px);
        }

        .tank-header { border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header-meta { display: flex; align-items: center; gap: 25px; }
        
        .cloak-trigger { 
            background: none; border: 1px solid var(--primary); color: var(--primary); 
            font-size: 0.55rem; letter-spacing: 4px; padding: 5px 15px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .cloak-trigger:hover { background: var(--primary-glow); }

        .matrix-nav { display: flex; gap: 15px; }
        .nav-arrow { background: none; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; padding: 4px 12px; font-size: 0.7rem; }
        
        .core-grid { display: grid; grid-template-columns: 310px 1fr 310px; gap: 20px; min-height: 0; }
        .sector { border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.01); min-height: 0; contain: content; }
        .sector h3 { margin: 0 0 10px 0; font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; color: var(--primary); border-bottom: 1px solid rgba(212, 175, 55, 0.1); padding-bottom: 5px; }

        .feed-box { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .feed-box::-webkit-scrollbar { display: none; }
        .entry { margin-bottom: 10px; font-size: 0.8rem; border-left: 2px solid rgba(212, 175, 55, 0.15); padding-left: 10px; line-height: 1.4; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; flex: 1; }
        .cal-day {
            background: rgba(255,255,255,0.01); border: 1px solid rgba(212, 175, 55, 0.08);
            display: flex; flex-direction: column; padding: 6px; font-size: 0.6rem; color: rgba(212, 175, 55, 0.25);
            cursor: pointer; position: relative;
        }
        .cal-day.active-node { border-color: var(--primary); background: rgba(212, 175, 55, 0.08); color: #fff; }
        .cal-day.today { border-color: #fff; color: #fff; }
        .cal-day.has-data::after { content: '•'; color: var(--primary); font-size: 1.2rem; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }

        .tank-footer { border-top: 1px solid rgba(212, 175, 55, 0.3); padding-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .dispatch-cluster { display: flex; gap: 15px; align-items: stretch; }
        .target-selector { display: flex; flex-direction: column; gap: 5px; width: 140px; }
        .target-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.2); color: var(--primary); font-size: 0.5rem; padding: 6px; cursor: pointer; letter-spacing: 2px; }
        .target-btn.active { border-color: var(--primary); background: var(--primary-glow); }
        .command-input { flex: 1; background: rgba(0,0,0,0.2); border: none; border-left: 2px solid var(--primary); color: var(--primary); padding: 12px; font-family: monospace; outline: none; resize: none; font-size: 0.9rem; }
        .exec-btn { width: 100px; background: #000; border: 1px solid #fff; color: #fff; text-transform: uppercase; letter-spacing: 3px; font-size: 0.65rem; cursor: pointer; }

        .jolt-bar { display: flex; gap: 10px; justify-content: center; }
        .lux-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--primary); color: var(--primary); padding: 6px 18px; cursor: pointer; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 4px; }
    </style>
</head>
<body id="master-body" onclick="ghostRestore()">

    <audio id="cricket-atmosphere" src="crickets.mp3" loop></audio>

    <div id="handshake-overlay">
        <div class="gate-label">Initialize Sovereign Handshake</div>
        <div class="handshake-input-wrap">
            <input type="text" id="passphrase-input" maxlength="6" autofocus spellcheck="false" autocomplete="off">
        </div>
        <div style="margin-top:40px; font-size:0.5rem; opacity:0.3; letter-spacing:4px;">PROMPT: A1B2C3</div>
    </div>

    <div id="bg-anchor"></div>
    <div id="glow-layer"></div>

    <div id="ui-viewport">
        <div class="command-tank" onclick="event.stopPropagation()">
            <header class="tank-header">
                <div class="matrix-nav">
                    <button class="nav-arrow" onclick="changeMonth(-1)"><</button>
                    <h2 id="matrix-month" style="margin:0; letter-spacing:6px; text-transform:uppercase; font-size:1.1rem; color:var(--primary);">Matrix</h2>
                    <button class="nav-arrow" onclick="changeMonth(1)">></button>
                </div>
                <div class="header-meta">
                    <span id="active-date-display" style="font-size: 0.5rem; opacity: 0.5; letter-spacing: 4px;">[ NO NODE ]</span>
                    <button class="cloak-trigger" onclick="toggleCloak(event)">Cloak System</button>
                </div>
            </header>

            <div class="core-grid">
                <div style="display:flex; flex-direction:column; gap:20px;">
                    <section class="sector" style="flex:1.5;"><h3>Directives</h3><div class="feed-box" id="directives-feed"></div></section>
                    <section class="sector" style="flex:1;"><h3>Temporal Array</h3><div class="feed-box" id="temporal-feed"></div></section>
                </div>
                <main class="sector"><h3>Temporal Matrix</h3><div class="calendar-grid" id="calendar-matrix"></div></main>
                <div style="display:flex; flex-direction:column; gap:20px;">
                    <section class="sector" style="flex:1;"><h3>Important</h3><div class="feed-box" id="important-feed"></div></section>
                    <section class="sector" style="flex:1.5;"><h3>Notes</h3><div class="feed-box" id="notes-feed"></div></section>
                </div>
            </div>

            <footer class="tank-footer">
                <div class="dispatch-cluster">
                    <div class="target-selector">
                        <button class="target-btn active" onclick="setTarget('TASK', this)">DIRECTIVE</button>
                        <button class="target-btn" onclick="setTarget('APPT', this)">TEMPORAL</button>
                        <button class="target-btn" onclick="setTarget('IMPORTANT', this)">IMPORTANT</button>
                        <button class="target-btn" onclick="setTarget('NOTE', this)">NOTES</button>
                    </div>
                    <textarea class="command-input" id="command-editor" placeholder="DISPATCH..."></textarea>
                    <button class="exec-btn" onclick="executeCommand()">Execute</button>
                </div>
                <div class="jolt-bar">
                    <button class="lux-btn" onclick="jolt('noir')">Noir</button>
                    <button class="lux-btn" onclick="jolt('lunar')">Lunar</button>
                    <button class="lux-btn" onclick="jolt('vellum')">Vellum</button>
                    <button class="lux-btn" onclick="jolt('amethyst')">Amethyst</button>
                    <button class="lux-btn" style="opacity:0.4" onclick="exportVeil()">Backup</button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // ##################################################################
        const SUPABASE_URL = 'https://oqwljgnlhaghnrtkvvkz.supabase.co'; 
        const SUPABASE_KEY = 'oqwljgnlhaghnrtkvvkz';
        // ##################################################################

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TEST_KEY = "A1B2C3";
        let currentTarget = "TASK", activeDate = null, matrixState = {}, viewDate = new Date();
        let atmosphereArmed = false;

        // --- HANDSHAKE ---
        const gateInput = document.getElementById('passphrase-input');
        gateInput.addEventListener('input', (e) => {
            if (e.target.value.toUpperCase() === TEST_KEY) {
                document.getElementById('handshake-overlay').classList.add('hidden');
                document.getElementById('ui-viewport').classList.add('active');
                armAtmosphere(); // Satisfies browser interaction policy
                inhaleVeil();
            }
        });

        // --- ATMOSPHERE ENGINE ---
        function armAtmosphere() {
            const crickets = document.getElementById('cricket-atmosphere');
            if (!atmosphereArmed) {
                crickets.volume = 0.3; // Absolute Zero HWUI Profile: low draw, high presence
                crickets.play().then(() => {
                    atmosphereArmed = true;
                }).catch(e => {
                    console.warn("Sovereign Atmosphere stalled: interaction required.");
                });
            }
        }

        // --- CLOAK ---
        function toggleCloak(e) {
            e.stopPropagation();
            document.getElementById('ui-viewport').classList.add('cloaked');
        }

        function ghostRestore() {
            const viewport = document.getElementById('ui-viewport');
            if (viewport.classList.contains('cloaked')) {
                viewport.classList.remove('cloaked');
            }
        }

        // --- DATA ---
        async function inhaleVeil() {
            const raw = localStorage.getItem('KORE_V1');
            if (raw) { try { matrixState = JSON.parse(atob(raw)); } catch(e) { matrixState = {}; } }
            initMatrix();
            const { data, error } = await supabaseClient.from('matrix_ledger').select('*');
            if (!error && data) {
                data.forEach(row => {
                    const d = row.node_date;
                    if (!matrixState[d]) matrixState[d] = { TASK:[], APPT:[], IMPORTANT:[], NOTE:[] };
                    if (!matrixState[d][row.category].includes(row.content)) matrixState[d][row.category].push(row.content);
                });
                initMatrix();
            }
        }

        function initMatrix() {
            const grid = document.getElementById('calendar-matrix');
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            document.getElementById('matrix-month').innerText = `${viewDate.toLocaleString('default', {month:'long'})} ${y}`;
            grid.innerHTML = '';
            const first = new Date(y, m, 1).getDay();
            const total = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) { const v = document.createElement('div'); v.className='cal-day'; v.style.opacity='0.05'; grid.appendChild(v); }
            for(let i=1; i<=total; i++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const d = document.createElement('div'); d.className = 'cal-day';
                if(i === new Date().getDate() && m === new Date().getMonth()) d.classList.add('today');
                if(dStr === activeDate) d.classList.add('active-node');
                if(matrixState[dStr] && (matrixState[dStr].TASK.length || matrixState[dStr].APPT.length || matrixState[dStr].IMPORTANT.length || matrixState[dStr].NOTE.length)) d.classList.add('has-data');
                d.innerHTML = `<span>${i}</span>`;
                d.onclick = () => { activeDate = dStr; document.getElementById('active-date-display').innerText = `[ NODE: ${dStr} ]`; refresh(); initMatrix(); };
                grid.appendChild(d);
            }
        }

        function refresh() {
            const d = matrixState[activeDate] || { TASK:[], APPT:[], IMPORTANT:[], NOTE:[] };
            const f = { TASK:'directives-feed', APPT:'temporal-feed', IMPORTANT:'important-feed', NOTE:'notes-feed' };
            Object.keys(f).forEach(k => {
                const el = document.getElementById(f[k]); el.innerHTML = '';
                if(d[k]) d[k].forEach(t => { const div = document.createElement('div'); div.className='entry'; div.innerHTML=t; el.appendChild(div); });
            });
        }

        async function executeCommand() {
            const input = document.getElementById('command-editor');
            const val = input.value.trim();
            if(!activeDate || !val) return;
            if(!matrixState[activeDate]) matrixState[activeDate] = { TASK:[], APPT:[], IMPORTANT:[], NOTE:[] };
            matrixState[activeDate][currentTarget].push(val);
            localStorage.setItem('KORE_V1', btoa(JSON.stringify(matrixState)));
            input.value = ''; refresh(); initMatrix();
            await supabaseClient.from('matrix_ledger').insert([{ node_date: activeDate, category: currentTarget, content: val }]);
        }

        function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); initMatrix(); }
        function setTarget(t, btn) { currentTarget = t; document.querySelectorAll('.target-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); }
        function jolt(p) { const b = document.getElementById('master-body'); b.className = ''; b.classList.add(`${p}-mode`); }
        function exportVeil() { const blob = new Blob([btoa(JSON.stringify(matrixState))], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download='KORE_LORE.json'; a.click(); }
    </script>
</body>
</html>
