<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // If the Sync Key is missing, hard-redirect to the boot sequence
        if (!sessionStorage.getItem('KORE_Synced')) {
            window.location.href = 'teaser.html';
        }
        
        // Refresh Tether (Ensures clean boot on accidental swipe)
        if (performance.navigation.type === 1 || window.performance.getEntriesByType("navigation")[0].type === "reload") {
            window.location.href = "guild.html"; 
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE COVENANT // PROJECT KORE</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script>
        if (performance.navigation.type === 1 || window.performance.getEntriesByType("navigation")[0].type === "reload") {
            window.location.href = "guild.html"; 
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="audio-engine.js"></script>
    
    <style>
        :root { --bg: #050505; --accent: #d4af37; --text: #e0e0e0; --glass: rgba(15, 15, 15, 0.95); }
        [data-palette="LUNAR"] { --bg: #0a0c10; --accent: #a8c0ff; --text: #ffffff; }
        [data-palette="VELLUM"] { --bg: #0f0d0b; --accent: #c4a484; --text: #d2b48c; }
        [data-palette="AMETHYST"] { --bg: #0d0510; --accent: #cd7f32; --text: #9b59b6; }
        
        body { margin: 0; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; background: var(--bg) url('command_8k.webp') center/cover no-repeat; color: var(--text); transition: 0.8s; }
        
        .neural-anchor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); opacity: 0; pointer-events: none; z-index: 9999; animation: brainReset 0.166s infinite alternate; }
        @keyframes brainReset { from { opacity: 0; } to { opacity: 0.02; } }
        
        .breathing-filigree { position: fixed; bottom: -10%; right: -10%; width: 70%; height: 70%; background: radial-gradient(circle at bottom right, var(--accent), transparent 70%); filter: blur(60px); pointer-events: none; animation: somaticBreath 19s infinite ease-in-out; }
        @keyframes somaticBreath { 0%, 100% { opacity: 0.05; transform: scale(1); } 21%, 58% { opacity: 0.3; transform: scale(1.1); } }
        
        #interface { height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 10; position: relative; }
        .vault { border: 1px solid var(--accent); padding: 50px; background: var(--glass); width: 80%; max-width: 700px; backdrop-filter: blur(25px); }
        .artifact-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.6rem; letter-spacing: 2px; }
    </style>
</head>
<body x-data>
    <div class="neural-anchor"></div>
    <div class="breathing-filigree"></div>

    <nav style="position: absolute; top: 30px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 100;">
        <a href="guild.html" style="color: var(--accent); text-decoration: none; font-size: 0.7rem; letter-spacing: 2px;">◂ GUILD HALL</a>
        <button class="artifact-btn" onclick="toggleAlignment()">✨ ALIGNMENT</button>
    </nav>

    <main id="interface">
        <section class="vault">
            <h1 style="letter-spacing: 10px; color: var(--accent);">📜 THE COVENANT</h1>
            <p style="font-size: 0.8rem; letter-spacing: 2px; opacity: 0.7;">[ STRATEGIC DIRECTIVES // IDENTITY LOCKED ]</p>
            <div style="margin-top: 30px; border-top: 1px solid rgba(212, 175, 55, 0.1); padding-top: 20px;">
                <p>Threshold Status: <strong>ENEE-5W COMPLIANT</strong></p>
                <p>Operational Focus: <strong>RESOURCES & LOGISTICS</strong></p>
            </div>
        </section>
    </main>

    <script>
        function toggleAlignment() {
            const palettes = ['NOIR', 'LUNAR', 'VELLUM', 'AMETHYST'];
            let next = palettes[(palettes.indexOf(localStorage.getItem('KORE_Palette') || 'NOIR') + 1) % palettes.length];
            document.documentElement.setAttribute('data-palette', next);
            localStorage.setItem('KORE_Palette', next);
        }

        document.addEventListener('DOMContentLoaded', () => { 
            document.documentElement.setAttribute('data-palette', localStorage.getItem('KORE_Palette') || 'NOIR'); 
        });

        /* THE SOVEREIGN SHIELD HANDSHAKE (sw.js Registration) */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('KORE // Covenant Shield Verified.'))
                .catch(err => console.error('Shield Sync Failure:', err));
        }
    </script>
</body>
</html>
