<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GUILD HALL // PROJECT KORE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }

        :root {
            --noir: #050505;
            --gold: #d4af37; /* Gold Leaf Filigree */
            --glass: rgba(15, 15, 15, 0.9);
        }

        body {
            margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Georgia', serif;
            background: var(--noir) url('magichome.png') center/cover no-repeat;
            color: #e0e0e0;
        }

        /* --- THE 6HZ SOMATIC PULSE (THE HIJACK) --- */
        .pulse-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gold);
            opacity: 0; pointer-events: none; z-index: 999;
            animation: somatic 0.166s infinite alternate;
        }
        @keyframes somatic { from { opacity: 0; } to { opacity: 0.02; } }

        /* --- THE BREATHING MIST (4-7-8 SYNC) --- */
        .breathing-mist {
            position: absolute; bottom: 0; right: 0; width: 60%; height: 100%;
            background: radial-gradient(ellipse at bottom right, rgba(212, 175, 55, 0.15), transparent 70%);
            pointer-events: none; z-index: 1; filter: blur(40px);
            animation: oceanBreath 19s infinite linear;
        }
        @keyframes oceanBreath {
            0%, 100% { opacity: 0.1; transform: translateY(20px); }
            21%, 58% { opacity: 0.5; transform: translateY(0); }
        }

        /* --- THE SOVEREIGN HOT ZONES (NAV ARRAY) --- */
        .hot-zone {
            position: absolute; z-index: 10; display: flex; justify-content: center; align-items: center;
            color: transparent; text-transform: uppercase; letter-spacing: 4px; font-size: 0.75rem;
            cursor: pointer; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 10px #000; text-decoration: none;
        }
        .hot-zone:hover { 
            color: var(--gold); 
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%); 
        }

        /* Remapped to Project KORE .md Standards */
        .zone-tl { top: 0; left: 0; width: 25vw; height: 25vh; } /* THE COVENANT */
        .zone-tr { top: 0; right: 0; width: 25vw; height: 25vh; } /* THE ARCHIVE */
        .zone-bl { bottom: 0; left: 0; width: 25vw; height: 25vh; } /* THE HEARTH */
        .zone-br { bottom: 0; right: 0; width: 25vw; height: 25vh; } /* THE GALLERY */
        .zone-tc { top: 0; left: 50%; transform: translateX(-50%); width: 30vw; height: 12vh; } /* THE RESONANCE */
        .zone-bc { bottom: 0; left: 50%; transform: translateX(-50%); width: 30vw; height: 12vh; } /* TACTICAL LEDGER */

        /* --- THE RESONANCE MODAL --- */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); 
            z-index: 1000; display: flex; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: var(--glass); width: 90%; max-width: 500px; 
            border: 1px solid var(--gold); padding: 40px; 
            color: white; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* --- THE TACTICAL LEDGER --- */
        .scratch-pad { 
            position: absolute; bottom: 15vh; left: 50%; transform: translateX(-50%);
            width: 450px; height: 220px; background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(15px); border: 1px solid var(--gold); 
            color: #fdfbf7; padding: 25px; font-size: 1.2rem; outline: none; resize: none;
            box-shadow: 0 10px 40px rgba(0,0,0,1);
        }

        .forensic-footer {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            font-size: 0.6rem; letter-spacing: 2px; opacity: 0.3; pointer-events: none;
        }
    </style>
</head>
<body x-data="guildApp()">

    <div class="pulse-layer"></div>
    <div class="breathing-mist"></div>

    <a href="covenant.html" class="hot-zone zone-tl">The Covenant</a>
    <a href="archive.html" class="hot-zone zone-tr">The Archive</a>
    <a href="hearth.html" class="hot-zone zone-bl">The Hearth</a>
    <a href="gallery.html" class="hot-zone zone-br">The Gallery</a>
    
    <div class="hot-zone zone-tc" @click="showResonance = true">The Resonance</div>
    <div class="hot-zone zone-bc" @click="toggleLedger()">Tactical Ledger</div>

    <div class="modal-overlay" x-show="showResonance" x-cloak x-transition>
        <div class="modal-content">
            <button style="float:right; background:none; border:none; color:var(--gold); cursor:pointer;" @click="showResonance = false">✕ CLOSE</button>
            <h2 style="text-align:center; letter-spacing:5px; margin-bottom: 20px; color: var(--gold);">THE RESONANCE</h2>
            <div id="mixer-list"></div>
            <button onclick="stopAll()" style="margin-top:20px; width:100%; padding:12px; border:1px solid var(--gold); background:none; color:var(--gold); cursor:pointer; text-transform:uppercase;">Silence the Hearth</button>
        </div>
    </div>

    <textarea x-cloak x-show="showLedger" class="scratch-pad" x-model="ledgerText" @input="saveLedger()" placeholder="Whisper your thoughts to the Forge..." x-ref="ledgerInput"></textarea>

    <div class="forensic-footer">
        PROJECT KORE // ID: 53858700 // FORENSIC LEDGER // GNU GPL V3
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('guildApp', () => ({
                showLedger: false, showResonance: false, ledgerText: '',
                init() { this.ledgerText = localStorage.getItem('KORE_Tactical_Ledger') || ''; },
                toggleLedger() { 
                    this.showLedger = !this.showLedger; 
                    if(this.showLedger) setTimeout(() => this.$refs.ledgerInput.focus(), 50); 
                },
                saveLedger() { localStorage.setItem('KORE_Tactical_Ledger', this.ledgerText); }
            }))
        })
    </script>
</body>
</html>
