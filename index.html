<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="intro-screen" class="fullscreen-overlay">
        <div class="brand-container">
            <h1 class="kore-title">KORE</h1>
            <p class="kore-tagline">HEARTH & HOME</p>
            <button id="enter-btn" class="sanctuary-btn">Enter Sanctuary</button>
        </div>
    </div>

    <div id="exit-screen" class="fullscreen-overlay hidden">
        <div class="brand-container">
            <h1 class="kore-title">KORE</h1>
            <p class="kore-tagline" style="margin-top: 20px;"></p>
        </div>
    </div>

    <div class="hearth-container"></div>

    <div id="somatic-layer" class="somatic-filter"></div>

    <audio id="sanctuary-audio" loop>
        <source src="fire.mp3" type="audio/mpeg">
    </audio>

    <script src="scripts.js"></script>
</body>
</html>
