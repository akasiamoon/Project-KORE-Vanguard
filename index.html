<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project KORE | The Wayshrine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="intro-screen" class="intro-layer active">
        <div class="intro-content">
            <h1 class="kore-title">PROJECT KORE</h1>
            <p class="kore-subtitle">Vanguard Engine</p>
            <button id="start-btn" class="init-btn">ENTER SANCTUARY</button>
        </div>
    </div>

    <audio id="sanctuary-audio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2391/2391-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="wayshrine-container" onclick="triggerSomaticHijack()">
        <div class="breton-desk-trigger"></div>
    </div>

    <div id="somatic-layer" class="somatic-filter">
        <div class="exit-trigger" onclick="dismissHijack(event)">✕ Dismiss</div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
