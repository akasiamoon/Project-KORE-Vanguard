<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORE: Vanguard Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="intro-screen" class="fullscreen-overlay">
        <div class="brand-container">
            <h1 class="kore-title">KORE</h1>
            <p class="kore-tagline">THE SOVEREIGN RECOVERY MULTIVERSE</p>
            <button id="enter-btn" class="sanctuary-btn">ENTER SANCTUARY</button>
        </div>
    </div>

    <div class="hearth-container" onclick="triggerSomaticHijack()">
        <div id="lore-shard" class="glowing-shard" onclick="triggerLore(event)"></div>
    </div>

    <div id="somatic-layer" class="somatic-filter">
        <div class="exit-trigger" onclick="dismissHijack(event)">✕ LEAVE PARTY</div>
        
        <div id="party-hud" class="glass-ui party-roster">
            <div class="hud-header">PULSE-GUILD [ACTIVE]</div>
            <div class="member"><span class="gold">AMBER [ARCHITECT]</span> <span class="status-alert">LOW EMBER</span></div>
            <div class="member">CORY [VISITING] <span class="status-calm">AEGIS ACTIVE</span></div>
        </div>

        <div id="quest-tracker" class="glass-ui quest-tracker">
            <div class="hud-header">VANGUARD MISSION</div>
            <div class="quest-item">THE GREY FOG</div>
            <div class="quest-sub">Cast Aegis (Deep Breathing)</div>
        </div>
    </div>

    <div id="lore-banner" class="lore-notification">
        <span class="gold">✦</span> FRAGMENT DECRYPTED: THE SOVEREIGN VOW
    </div>

    <audio id="sanctuary-audio" loop><source src="fire.mp3" type="audio/mpeg"></audio>

    <button class="manifesto-trigger" onclick="triggerInvestorTour()">THE MANIFESTO</button>

    <script src="scripts.js"></script>
</body>
</html>
