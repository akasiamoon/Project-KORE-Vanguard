<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRANSMISSION // PROJECT KORE</title>
    <style>
        :root { --gold: #d4af37; --noir: #050505; }
        body { margin: 0; background: var(--noir); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Georgia', serif; }
        
        .cinematic-bg { position: fixed; width: 100%; height: 100%; background: url('atrium_8k.webp') center/cover; opacity: 0; transition: opacity 5s ease-in-out; z-index: 1; }
        
        .pulse { position: fixed; width: 100%; height: 100%; background: var(--gold); opacity: 0; animation: p 0.166s infinite alternate; z-index: 999; pointer-events: none; }
        @keyframes p { from { opacity: 0; } to { opacity: 0.02; } }

        .title-card { color: var(--gold); text-align: center; z-index: 10; opacity: 0; transform: scale(0.9); transition: 4s; }
        .title-card.visible { opacity: 1; transform: scale(1); }

        .glitch-text { font-size: 1.5rem; letter-spacing: 12px; text-transform: uppercase; }
        .sub-text { font-size: 0.6rem; letter-spacing: 5px; margin-top: 20px; opacity: 0.5; }

        .artifact-btn { margin-top: 40px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; opacity: 0; transition: 2s; }
    </style>
</head>
<body onclick="startTeaser()">
    <div class="pulse"></div>
    <div id="bg" class="cinematic-bg"></div>

    <main id="card" class="title-card">
        <div class="glitch-text">Project KORE</div>
        <div class="sub-text">Sovereign Interface // ENEE-5W // Active</div>
        <button id="enter" class="artifact-btn" onclick="window.location.href='guild.html'">Enter the Forge</button>
    </main>

    <script>
        function startTeaser() {
            // Visual Sequence
            document.getElementById('bg').style.opacity = "0.4";
            setTimeout(() => { document.getElementById('card').classList.add('visible'); }, 2000);
            setTimeout(() => { document.getElementById('enter').style.opacity = "1"; }, 5000);
            
            // Audio Handshake (Requires user click)
            const waves = new Audio('waves.mp3');
            waves.loop = true;
            waves.volume = 0.4;
            waves.play();
        }
        // Auto-prompt to click
        window.onload = () => { console.log("Awaiting Somatic Trigger..."); };
    </script>
</body>
</html>
